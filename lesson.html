<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h2>BUTTONS</h2>
    <button>SUBMIT</button><br><br>

    <button class="btn btn-success btn-lg">SUBMIT</button>
    <button class="btn btn-warning ">SUBMIT</button>
    <button class="btn btn-danger btn-sm">SUBMIT</button><br><br>

    <button class="btn btn-lg btn-outline-success ">SUBMIT</button>
    <button class="btn btn-outline-warning ">SUBMIT</button>
    <button class="btn btn-sm btn-outline-danger ">SUBMIT</button><br><br>

    <h2>BADGES</h2>
    <button class="btn btn-primary ">Notifications <span class="badge text-bg-warning">25</span></button><br><br>

    <h2>PROGRESS BAR</h2>
    <div class="progress">
        <div class="progress-bar" style="width: 30%;">Loading... </div>
    </div><br><br>
    <div class="progress">
        <div class="progress-bar progress-bar-striped bg-warning" style="width: 60%;">Loading... </div>
    </div><br><br>
    <div class="progress">
        <div class="progress-bar progress-bar-striped bg-danger progress-bar-animated" style="width: 90%;">Loading... </div>
    </div><br><br>
    
    <h2>SPINNERS</h2>
    <span class="spinner-border"></span><br>
    <span class="spinner-border text-success"></span><br><br>
    <span class="spinner-grow text-primary"></span><br>
    <span class="spinner-grow spinner-grow-sm text-danger "></span><br>
</body>
</html>
